name: в—ЎрҹҘҖрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹҘҖв—ЎгҖҗрҹ‘»гҖ‘

# Bбәӯt/tбәҜt upload Artifact ( .jar )
env:
  ENABLE_ARTIFACT: false

on:
  push:
    branches: [ main ]
    #workflow_dispatch:

permissions:
  actions: write
  contents: read
  
jobs:
  aoichan:
    name: в—ЎрҹҘҖрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹҘҖв—Ў
    runs-on: ubuntu-latest
    
    steps:
      - name: рҹ”Һрқ“’рқ“ұрқ“®рқ“¬рқ“ҙ рқ“ўрқ“ёрқ“ҫрқ“»рқ“¬рқ“®
        uses: actions/checkout@v6
          
      # ДҗГіng gГіi file .jar
      - name: рҹ“Ұ рқ“Өрқ“№рқ“өрқ“ёрқ“Әрқ“»рқ“ӯ рқ“ірқ“Әрқ“»
        if: ${{ env.ENABLE_ARTIFACT == 'true' }}
        uses: actions/upload-artifact@v5
        with:
          name: Resource-Packs
          path: .

      # Tб»ұ Д‘б»ҷng dб»Қn dбә№p Workflows Runs гҖҗ 5 Runs гҖ‘
      - name: вҷ»пёҸрқҗҺрқҗӢрқҗғ рқҗ–рқҗҺрқҗ‘рқҗҠрқҗ…рқҗӢрқҗҺрқҗ–рқҗ’
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[1:] | map(select(.status=="completed")) | .[].id' \
            | while read run; do
                echo "рҹ—‘пёҸ Д‘ГЈ xГіa $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_RESOURCES }}

      - name: вҷ»пёҸрқҗҺрқҗӢрқҗғ рқҗӮрқҗҖрқҗӮрқҗҮрқҗ„
        run: |
          gh cache list --json id,createdAt \
            | jq 'sort_by(.createdAt) | reverse | .[1:] | .[].id' \
            | while read id; do
                echo "рҹ—‘пёҸ Д‘ГЈ xГіa $id"
                gh cache delete "$id"
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_RESOURCES }}
