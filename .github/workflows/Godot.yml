name: "Android Production Build"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-22.04
    name: Export Android APK
    
    env:
      GODOT_VERSION: "4.3"
      GODOT_STATUS: "stable"
      EXPORT_NAME: "mobile-3d-minecraft"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Godot Editor and Export Templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot/
            /usr/local/bin/godot
          key: ${{ runner.os }}-godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Download Godot Editor and Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          # Khởi tạo URL chính xác tuyệt đối theo cấu trúc release của Godot Engine
          URL_EDITOR="https://github.com{{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_linux.x86_64.zip"
          URL_TEMPLATES="https://github.com{{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_export_templates.tpz"
          
          # Thực hiện tải về và kiểm tra tính toàn vẹn dữ liệu trực tiếp
          wget --tries=3 --connect-timeout=10 -q "$URL_EDITOR"
          wget --tries=3 --connect-timeout=10 -q "$URL_TEMPLATES"
          
          # Giải nén và phân bổ cấu trúc hệ thống chạy CLI
          unzip Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          
          # Cài đặt Export Templates vào thư mục hệ thống của Godot Editor
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_STATUS }}
          unzip Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_STATUS }}/
          
          # Dọn dẹp tài nguyên rác sau khi phân tách thành công
          rm -f Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_linux.x86_64.zip
          rm -f Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}_export_templates.tpz

      - name: Create Export Directories
        run: mkdir -p build/android

      - name: Export Release APK via Godot CLI
        run: |
          godot --headless --export-release "Android" build/android/${{ env.EXPORT_NAME }}.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error
          retention-days: 1
 
