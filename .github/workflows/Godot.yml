name: "Android Production Build"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-22.04
    name: Export Android APK
    
    env:
      EXPORT_NAME: "mobile-3d-minecraft"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Godot Editor and Export Templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot/
            /usr/local/bin/godot
          key: ${{ runner.os }}-godot-4.3-stable

      - name: Download Godot Editor and Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          # Thiết lập link tải tĩnh tuyệt đối tránh lỗi biên dịch chuỗi trên GitHub Runner
          URL_EDITOR="https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip"
          URL_TEMPLATES="https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
          
          # Thực hiện tải với cờ kiểm tra kết nối chặt chẽ
          wget --tries=3 --connect-timeout=20 -q "$URL_EDITOR"
          wget --tries=3 --connect-timeout=20 -q "$URL_TEMPLATES"
          
          # Giải nén phân hệ Godot Editor CLI
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          
          # Khởi tạo và thiết lập Export Templates cho hệ thống
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip -q Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/
          
          # Dọn dẹp lưu trữ tạm
          rm -f Godot_v4.3-stable_linux.x86_64.zip
          rm -f Godot_v4.3-stable_export_templates.tpz

      - name: Configure Android SDK Path for Godot
        run: |
          mkdir -p ~/.config/godot
          echo '[settings]' > ~/.config/godot/editor_settings-4.tres
          echo 'export/android/android_sdk_path = "'"$ANDROID_HOME"'"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/shutdown_adb_on_exit = true' >> ~/.config/godot/editor_settings-4.tres

      - name: Create Export Directories
        run: mkdir -p build/android

      - name: Export Release APK via Godot CLI
        run: |
          godot --headless --export-release "Android" build/android/${{ env.EXPORT_NAME }}.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error
          retention-days: 1
