name: "Build Godot 4.6.3 Android APK"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot via GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sử dụng GitHub CLI (gh) có sẵn trên server để tải file trực tiếp từ kho Godot
          gh release download 4.6.3-stable --repo godotengine/godot --pattern "Godot_v4.6.3-stable_linux.x86_64.zip"
          unzip Godot_v4.6.3-stable_linux.x86_64.zip
          mv Godot_v4.6.3-stable_linux.x86_64 godot
          chmod +x godot

          # Tải Export Templates
          gh release download 4.6.3-stable --repo godotengine/godot --pattern "Godot_v4.6.3-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/4.6.3.stable
          unzip Godot_v4.6.3-stable_export_templates.tpz -d templates_extracted
          mv templates_extracted/templates/* ~/.local/share/godot/export_templates/4.6.3.stable/
          
          # Dọn dẹp tệp tin tạm
          rm -rf templates_extracted Godot_v4.6.3-stable_export_templates.tpz Godot_v4.6.3-stable_linux.x86_64.zip

      - name: Auto-Create Export Presets File
        run: |
          # Tự động tạo cấu hình export_presets.cfg chuẩn không cần keystore
          cat << 'EOF' > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/android/game-release.apk"
          encryption/encrypt_pck=false
          encryption/encrypt_directory=false
          
          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          version/code=1
          version/name="1.0"
          package/unique_name="com.example.godotgame"
          package/name="Godot Game"
          package/signed=false
          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          EOF

      - name: Prepare Export Directories
        run: |
          mkdir -p build/android

      - name: Build Android APK (Release No Keystore)
        run: |
          # Thực thi build không giao diện
          ./godot --headless --export-release "Android" build/android/game-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-apk
          path: build/android/game-release.apk
          retention-days: 7
