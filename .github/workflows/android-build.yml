name: "Build Godot 4.6.3 Android APK"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Godot Engine & Templates
        uses: chickenandpork/setup-godot@v1
        with:
          version: "4.6.3"
          use-mono: false

      - name: Auto-Create Export Presets File
        run: |
          # Tự động tạo file cấu hình để không bị lỗi thiếu thiết lập Android
          cat << 'EOF' > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/android/game-release.apk"
          encryption/encrypt_pck=false
          encryption/encrypt_directory=false
          
          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          version/code=1
          version/name="1.0"
          package/unique_name="com.example.godotgame"
          package/name="Godot Game"
          package/signed=false
          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          EOF

      - name: Prepare Export Directories
        run: |
          mkdir -p build/android

      - name: Build Android APK (Release No Keystore)
        run: |
          # Sử dụng trực tiếp lệnh godot đã được setup ở bước trên
          godot --headless --export-release "Android" build/android/game-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-apk
          path: build/android/game-release.apk
          retention-days: 7
