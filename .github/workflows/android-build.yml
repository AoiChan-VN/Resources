name: "Build Godot 4.6.3 Android APK"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot via GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sử dụng GitHub CLI (gh) có sẵn trên server để tải file trực tiếp từ kho Godot
          gh release download 4.7-stable --repo godotengine/godot --pattern "Godot_v4.7-stable_linux.x86_64.zip"
          unzip Godot_v4.7-stable_linux.x86_64.zip
          mv Godot_v4.7-stable_linux.x86_64 godot
          chmod +x godot

          # Tải Export Templates
          gh release download 4.7-stable --repo godotengine/godot --pattern "Godot_v4.7-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          unzip Godot_v4.7-stable_export_templates.tpz -d templates_extracted
          mv templates_extracted/templates/* ~/.local/share/godot/export_templates/4.7.stable/
          
          # Dọn dẹp tệp tin tạm
          rm -rf templates_extracted Godot_v4.7-stable_export_templates.tpz Godot_v4.7-stable_linux.x86_64.zip

      - name: Prepare Export Directories
        run: |
          mkdir -p build/android

      - name: Build Android APK (Release No Keystore)
        run: |
          # Thực thi build không giao diện
          ./godot --headless --export-release "Android" build/android/game-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-apk
          path: build/android/game-release.apk

      # Tự động dọn dẹp Workflows Runs 【 5 Runs 】
      - name: ♻️𝐎𝐋𝐃 𝐖𝐎𝐑𝐊𝐅𝐋𝐎𝐖𝐒
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[1:] | map(select(.status=="completed")) | .[].id' \
            | while read run; do
                echo "🗑️ đã xóa $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_RESOURCES }}

      - name: ♻️𝐎𝐋𝐃 𝐂𝐀𝐂𝐇𝐄
        run: |
          gh cache list --json id,createdAt \
            | jq 'sort_by(.createdAt) | reverse | .[1:] | .[].id' \
            | while read id; do
                echo "🗑️ đã xóa $id"
                gh cache delete "$id"
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_RESOURCES }}

